# IP address for the Appium server
ipAddress = 127.0.0.1

# Port number for the Appium server
port = 4723

# Name of the Android device or emulator to use for testing
androidDeviceName = Pixel 5 API 27

# Package name of the Android app under test
appPackage = io.appium.android.apis

# Main activity of the Android app under test
appActivity = io.appium.android.apis.ApiDemos

# APK file name (stored in resources folder)
apkFileName = ApiDemos-debug.apk

# Default wait timeout in seconds (used by WaitHelper and DriverFactory implicit wait)
defaultWaitTimeout = 15

# Max retry count for failed tests
retryCount = 1