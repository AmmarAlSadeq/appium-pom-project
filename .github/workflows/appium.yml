name: Appium Android Tests

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@3
          appium driver install uiautomator2

      - name: Download APK
        run: |
          curl -L -o src/main/java/org/automation/resources/ApiDemos-debug.apk \
            https://github.com/appium/android-apidemos/releases/download/v6.0.6/ApiDemos-debug.apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_5
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            mkdir -p /home/runner/.npm-global/lib/node_modules/appium/build/lib/
            ln -s $(which appium) /home/runner/.npm-global/lib/node_modules/appium/build/lib/main.js
            appium --address 127.0.0.1 --port 4723 &
            APPIUM_PID=$!
            echo "Appium PID: $APPIUM_PID"
            sleep 10
            mvn clean test || true
            echo "Stopping Appium..."
            kill $APPIUM_PID || true
            killall node || true

      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: src/reports/extent-report.html

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: src/reports/screenshots/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
